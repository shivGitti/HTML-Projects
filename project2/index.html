<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h1>Student Registration Form</h1>
    <p>All section of form is compulsory to fill.</p>

    <form>

        <fieldset>
            <legend>Personal Details</legend>
            
            <label for="fName">First Name :</label>
            <input type="text" id="fName" placeholder="Shivanshu" required autofocus>
            
            <br><br>

            <label for="lName">Last Name :</label>
            <input type="text" id="lName" placeholder="Mishra" required>

            <br><br>

            <label for="dob">Date of Birth :</label>
            <input type="date" id="dob" required>

            <br><br>

            <label for="gender">Gender :</label>
            <br>
            <input type="radio" value="Male" name="gender">Male
            <br>
            <input type="radio" value="Female" name="gender">Female
            <br>
            <input type="radio" value="Other" name="gender">Others

        </fieldset>

        <br>

        <fieldset>
            <legend>Accademic Details</legend>
            
            <p>Branch : 
            <select name="branch" required>
                <option value="mech">Mechanical</option>
                <option value="civil">Civil</option>
                <option value="et">ET&T</option>
                <option value="eee">EEE</option>
                <option value="cse" selected>CSE</option>
            </select>
            </p>

            <label for="semester">Semester : </label>
            <input type="number" max="8" min="1" step="1" required id="semester">

        </fieldset>

        <br><br>

        <fieldset>
            <legend>About You</legend>
            <textarea name="about" id="about" rows="8" cols="40" placeholder="Tell us about yourself..."></textarea>
            <br><br>
            <label for="photo">Upload Your Photo : </label>
            <input type="file" name="pic" id="photo">
        </fieldset>

        <br><br>

        <fieldset>
            <legend>Terms and Conditions</legend>
            
            <input type="checkbox" id="terms">
            <label for="terms">I agree to all <a href="#">Terms and Conditions.</a></label>

        </fieldset>

        <br>

        <button type="submit">Submit Form</button>
        <button type="reset">Clear Form</button>

    </form>

</body>
</html>
