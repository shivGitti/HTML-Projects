<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h1>Student Registration Form</h1>
    <p>All section of form is compulsory to fill.</p>

    <form>

        <fieldset>
            <legend>Personal Details</legend>
            
            <label for="fName">First Name :</label>
            <input type="text" id="fName" placeholder="Shivanshu" required autofocus>
            
            <br><br>

            <label for="lName">Last Name :</label>
            <input type="text" id="lName" placeholder="Mishra" required>

            <br><br>

            <label for="dob">Date of Birth :</label>
            <input type="date" id="dob" required>

            <br><br>

            <label for="gender">Gender :</label>
            <br>
            <input type="radio" value="Male" name="gender">Male
            <br>
            <input type="radio" value="Female" name="gender">Female
            <br>
            <input type="radio" value="Other" name="gender">Others

        </fieldset>


    </form>

</body>
</html>
